name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: eeglab_mcp_server/pyproject.toml

      - name: Install package and dev dependencies
        run: python -m pip install -e ./eeglab_mcp_server[dev]

      - name: Run style checks
        run: |
          python -m ruff check eeglab_mcp_server scripts
          python -m black --check eeglab_mcp_server scripts
          python -m mypy --config-file eeglab_mcp_server/pyproject.toml eeglab_mcp_server

      - name: Run framework verifier
        run: python scripts/verify_framework.py --skip-mcp

      - name: Run official alignment verifier
        run: python scripts/verify_official_alignment.py
